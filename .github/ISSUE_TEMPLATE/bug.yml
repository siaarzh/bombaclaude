name: 🐛 Bug — sumting nuh right
description: Report a bug. Mi a fix it, seen?
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Wagwan. Yuh find a bug? Bless. Fill out di form below — patois optional, but appreciated.

  - type: textarea
    id: what-happened
    attributes:
      label: Wha happen?
      description: Describe di bug. Wha tier (lite / full / raw), wha trigger, wha go wrong?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Wha yuh expected?
      description: Wha yuh tink shoulda happen instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps fi reproduce
      placeholder: |
        1. ...
        2. ...
        3. di bug deh
    validations:
      required: false

  - type: input
    id: env
    attributes:
      label: Environment
      description: Claude Code version, OS, anyting else relevant
      placeholder: "Claude Code vX.Y.Z, Windows 11, …"
    validations:
      required: false
